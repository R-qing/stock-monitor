<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能股票监测系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <!-- 背景粒子 -->
    <canvas id="particles"></canvas>

    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-left">
            <span class="logo">🚀</span>
            <h1>智能股票监测系统</h1>
        </div>
        <div class="header-center">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入股票代码或名称搜索..." />
                <button id="searchBtn" onclick="App.search()">🔍</button>
            </div>
        </div>
        <div class="header-right">
            <span class="market-status" id="marketStatus">📊 数据加载中...</span>
            <span class="clock" id="clock"></span>
        </div>
    </header>

    <!-- 大盘概览卡片 -->
    <section class="overview" id="overview">
        <div class="card glow-blue">
            <div class="card-label">上涨</div>
            <div class="card-value up" id="overviewUp">--</div>
        </div>
        <div class="card glow-red">
            <div class="card-label">下跌</div>
            <div class="card-value down" id="overviewDown">--</div>
        </div>
        <div class="card">
            <div class="card-label">平盘</div>
            <div class="card-value" id="overviewFlat">--</div>
        </div>
        <div class="card glow-green">
            <div class="card-label">涨停</div>
            <div class="card-value limit-up" id="overviewLimitUp">--</div>
        </div>
        <div class="card glow-red">
            <div class="card-label">跌停</div>
            <div class="card-value limit-down" id="overviewLimitDown">--</div>
        </div>
        <div class="card">
            <div class="card-label">成交额(亿)</div>
            <div class="card-value" id="overviewTurnover">--</div>
        </div>
        <div class="card">
            <div class="card-label">平均涨幅</div>
            <div class="card-value" id="overviewAvg">--</div>
        </div>
    </section>

    <!-- Tab 切换 -->
    <nav class="tabs">
        <button class="tab active" onclick="App.switchTab('hot')">🔥 潜力排行</button>
        <button class="tab" onclick="App.switchTab('all')">📋 全市场</button>
        <button class="tab" onclick="App.switchTab('watchlist')">⭐ 自选股</button>
    </nav>

    <!-- 主内容区 -->
    <main class="main">
        <!-- 左侧：股票列表 -->
        <div class="panel panel-left">
            <div class="panel-header">
                <h2 id="panelTitle">🔥 潜力股排行</h2>
                <div class="sort-controls">
                    <select id="sortField" onchange="App.refreshList()">
                        <option value="score">按评分</option>
                        <option value="change_pct">按涨幅</option>
                        <option value="turnover_rate">按换手率</option>
                    </select>
                    <select id="sortOrder" onchange="App.refreshList()">
                        <option value="desc">降序</option>
                        <option value="asc">升序</option>
                    </select>
                </div>
            </div>
            <div class="stock-table-wrap">
                <table class="stock-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>代码</th>
                            <th>名称</th>
                            <th>现价</th>
                            <th>涨跌幅</th>
                            <th>换手率</th>
                            <th>评分</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                        <tr><td colspan="8" class="loading">⏳ 加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 右侧：详情面板 -->
        <div class="panel panel-right" id="detailPanel">
            <div class="detail-placeholder" id="detailPlaceholder">
                <div class="placeholder-icon">📈</div>
                <p>点击左侧股票查看详情</p>
                <p class="sub">K线图 + 技术指标 + 综合评分</p>
            </div>
            <div class="detail-content" id="detailContent" style="display:none;">
                <!-- 股票基本信息 -->
                <div class="detail-header" id="detailHeader">
                    <div class="detail-name">
                        <span class="name" id="detailName">--</span>
                        <span class="code" id="detailCode">--</span>
                    </div>
                    <div class="detail-price">
                        <span class="price" id="detailPrice">--</span>
                        <span class="change" id="detailChange">--</span>
                    </div>
                    <div class="detail-score">
                        <div class="score-circle" id="detailScoreCircle">--</div>
                        <span class="score-label">综合评分</span>
                    </div>
                    <button class="watchlist-btn" id="watchlistBtn" onclick="App.toggleWatchlist()">⭐ 自选</button>
                </div>

                <!-- 信号提示 -->
                <div class="signals" id="signalsPanel"></div>

                <!-- K线图 -->
                <div class="chart-container">
                    <div class="chart-title">
                        <span>K线图</span>
                        <div class="chart-tabs">
                            <button class="chart-tab active" onclick="Charts.setIndicator('ma')">MA</button>
                            <button class="chart-tab" onclick="Charts.setIndicator('boll')">BOLL</button>
                        </div>
                    </div>
                    <div id="klineChart" class="chart"></div>
                </div>

                <!-- 成交量 -->
                <div class="chart-container small">
                    <div class="chart-title">成交量</div>
                    <div id="volumeChart" class="chart"></div>
                </div>

                <!-- 技术指标 -->
                <div class="chart-container small">
                    <div class="chart-title">
                        <span>技术指标</span>
                        <div class="chart-tabs">
                            <button class="chart-tab active" onclick="Charts.setSubIndicator('macd')">MACD</button>
                            <button class="chart-tab" onclick="Charts.setSubIndicator('rsi')">RSI</button>
                            <button class="chart-tab" onclick="Charts.setSubIndicator('kdj')">KDJ</button>
                        </div>
                    </div>
                    <div id="indicatorChart" class="chart"></div>
                </div>

                <!-- 评分详情 -->
                <div class="score-details" id="scoreDetails"></div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>🚀 智能股票监测系统 v1.0 | 数据来源：东方财富 | 仅供参考，不构成投资建议</p>
    </footer>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
