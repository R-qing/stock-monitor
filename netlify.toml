[build]
  publish = "."

[functions]
  directory = "functions"
  node_bundler = "esbuild"
  included_files = ["lib/**"]

[[redirects]]
  from = "/api/market/overview"
  to = "/.netlify/functions/market/overview"
  status = 200

[[redirects]]
  from = "/api/stocks"
  to = "/.netlify/functions/stocks"
  status = 200

[[redirects]]
  from = "/api/stock/:code"
  to = "/.netlify/functions/stock/:code"
  status = 200

[[redirects]]
  from = "/api/hot"
  to = "/.netlify/functions/hot"
  status = 200
